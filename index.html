<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميلاد سعيد فريال 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* خلفية حمراء رومانسية عميقة */
            background: radial-gradient(ellipse at bottom, #8b0000 0%, #2b0005 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Tajawal', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* لوحة الرسم للمؤثرات البصرية */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* حاوية المحتوى */
        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 800px;
        }

        /* البطاقة الزجاجية الأنيقة */
        .glass-card {
            background: rgba(20, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 100, 100, 0.3);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 0 20px rgba(255, 0, 0, 0.1);
            text-align: center;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 1.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            font-family: 'Aref Ruqaa', serif;
            font-size: 3.5rem;
            color: #ffb3b3;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(255, 100, 100, 0.5);
            letter-spacing: 1px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(45deg, #ff4d4d, #cc0000);
            color: white;
            padding: 8px 25px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(204, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.2);
        }

        p.message {
            font-size: 1.3rem;
            line-height: 2;
            text-align: justify;
            text-align-last: center;
            color: #fce4e4;
            min-height: 200px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        /* مؤثر وميض خفيف للمؤشر */
        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.2rem;
            background-color: #ffb3b3;
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-right: 5px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* تحسينات للشاشات الصغيرة */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            p.message { font-size: 1.1rem; }
            .glass-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="content-wrapper">
        <div class="glass-card">
            <h1>إلى سكون الروح.. فريال</h1>
            <div class="badge">25 عاماً من النور</div>
            <p class="message"><span id="typewriter"></span><span class="cursor"></span></p>
        </div>
    </div>

    <script>
        // --- 1. نص الرسالة العاطفي والنفسي ---
        const text = "في لغة الأرقام، 25 عاماً هي مجرد زمن.. لكن في لغة الروح، هي مسيرة من النور الذي كان يتشكل ليضيء عالمي. يقول علماء النفس أن أقصى درجات الطمأنينة هي أن تجد شخصاً يمكنك أن تكون أمامه 'أنت' بلا أقنعة، وهذا ما أنتِ عليه يا فريال؛ مساحتي الآمنة وملاذي.\n\nفي يوم ميلادك، أردت أن أجمع لكِ كل ما تحبين.. كل عام وأنتِ 'الحوت' الذي يغوص في أعمق نقطة في قلبي، و'الباندا' التي تسرق ابتسامتي بلطفها وعفويتها، و'الطير' الذي يحلق بروحي عالياً فوق كل هموم الدنيا.\n\nأحبكِ، اليوم، وغداً، وإلى الأبد.";
        
        let charIndex = 0;
        const typingSpeed = 50; 
        
        function typeText() {
            if (charIndex < text.length) {
                const char = text.charAt(charIndex);
                const typewriterElement = document.getElementById("typewriter");
                
                if(char === '\n') {
                    typewriterElement.innerHTML += "<br>";
                } else {
                    typewriterElement.innerHTML += char;
                }
                charIndex++;
                setTimeout(typeText, typingSpeed);
            } else {
                document.querySelector('.cursor').style.display = 'none'; // إخفاء المؤشر عند الانتهاء
            }
        }

        // بدء الكتابة بعد ظهور البطاقة
        setTimeout(typeText, 1500);


        // --- 2. نظام المؤثرات البصرية المستقر (Canvas Engine) ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];

        // ضبط أبعاد الشاشة
        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // الرموز المستخدمة في الشاشة (قلوب + الكائنات التي طلبتها)
        const heartColors = ['#ff4d4d', '#ff1a1a', '#ff9999', '#cc0000'];
        const emojis = ['🐼', '🐋', '🕊️'];

        class Particle {
            constructor() {
                this.reset();
                // توزيع عشوائي للبدء من أماكن مختلفة في الشاشة في أول مرة
                this.y = Math.random() * height; 
            }

            reset() {
                // تحديد نوع الجزيء (70% قلوب، 30% كائنات أخرى)
                this.isEmoji = Math.random() > 0.7;
                
                if (this.isEmoji) {
                    this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
                    this.size = Math.random() * 30 + 20; // حجم بين 20 و 50
                } else {
                    this.color = heartColors[Math.floor(Math.random() * heartColors.length)];
                    this.size = Math.random() * 15 + 5;
                }

                this.x = Math.random() * width;
                this.y = height + this.size + Math.random() * 100; // يبدأ من أسفل الشاشة
                
                // سرعة الحركة
                this.speedY = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 1;
                
                // الحركة المتذبذبة (3D Illusion)
                this.angle = Math.random() * Math.PI * 2;
                this.spin = Math.random() * 0.1 - 0.05; // دوران الكائن
                this.currentRotation = 0;
                
                // الشفافية
                this.opacity = Math.random() * 0.5 + 0.3;
            }

            update() {
                this.y -= this.speedY;
                this.x += Math.sin(this.angle) * 1.5 + this.speedX;
                this.angle += 0.02;
                this.currentRotation += this.spin;

                // إعادة تدوير الجزيء إذا خرج من الشاشة من الأعلى
                if (this.y < -this.size * 2) {
                    this.reset();
                    this.y = height + this.size;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // إضافة وهم العمق الثلاثي الأبعاد عبر تغيير الحجم والشفافية والدوران
                ctx.rotate(this.currentRotation);
                
                if (this.isEmoji) {
                    ctx.globalAlpha = this.opacity;
                    ctx.font = `${this.size}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.emoji, 0, 0);
                } else {
                    ctx.globalAlpha = this.opacity;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    // رسم شكل القلب بدقة
                    const topCurveHeight = this.size * 0.3;
                    ctx.moveTo(0, topCurveHeight);
                    ctx.bezierCurveTo(0, 0, -this.size / 2, 0, -this.size / 2, topCurveHeight);
                    ctx.bezierCurveTo(-this.size / 2, this.size / 2, 0, this.size * 0.8, 0, this.size);
                    ctx.bezierCurveTo(0, this.size * 0.8, this.size / 2, this.size / 2, this.size / 2, topCurveHeight);
                    ctx.bezierCurveTo(this.size / 2, 0, 0, 0, 0, topCurveHeight);
                    ctx.closePath();
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }

        // إنشاء 60 جزيء (عدد ممتاز للأداء والشكل الجمالي)
        for (let i = 0; i < 60; i++) {
            particles.push(new Particle());
        }

        // حلقة الحركة المستمرة (Animation Loop)
        function animate() {
            // مسح الشاشة مع ترك أثر خفيف للحركة السابقة لجمالية أكبر
            ctx.clearRect(0, 0, width, height);
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate); // تكرار سلس
        }

        animate(); // تشغيل المؤثرات
    </script>
</body>
</html>
