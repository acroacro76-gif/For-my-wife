<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى سكون الروح.. فريال 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0844;
            --secondary: #ffb199;
            --bg-dark: #0a0002;
            --glass-bg: rgba(25, 0, 5, 0.5);
            --glass-border: rgba(255, 100, 120, 0.2);
            --text-gold: #ffdf73;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Cairo', sans-serif;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            cursor: default;
        }

        /* الخلفية التفاعلية */
        #interactive-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: auto;
        }

        /* تدرج لوني متحرك في الخلفية */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #3a0008 0%, var(--bg-dark) 80%);
            z-index: 0;
            animation: pulseBg 8s infinite alternate;
        }

        @keyframes pulseBg {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* شاشة الدخول */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: var(--bg-dark);
            transition: opacity 2s ease-in-out;
        }

        .heart-btn {
            font-size: 4rem;
            cursor: pointer;
            animation: heartbeat 1.2s infinite;
            filter: drop-shadow(0 0 20px var(--primary));
            user-select: none;
            transition: transform 0.3s;
        }
        
        .heart-btn:hover {
            transform: scale(1.2);
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }

        /* الحاوية الرئيسية للرسالة */
        .main-container {
            position: relative;
            z-index: 10;
            display: none; /* تظهر بعد النقر */
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            min-height: 100vh;
        }

        /* البطاقة الزجاجية المعقدة */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 60px 50px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), 
                        inset 0 0 40px rgba(255, 8, 68, 0.1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(50px);
            animation: floatUp 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* تأثير اللمعان على البطاقة */
        .glass-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(45deg);
            animation: shine 6s infinite;
            pointer-events: none;
        }

        @keyframes floatUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .title {
            font-family: 'Aref Ruqaa', serif;
            font-size: 4.5rem;
            text-align: center;
            background: linear-gradient(to right, var(--secondary), var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(255, 8, 68, 0.3);
        }

        .subtitle {
            text-align: center;
            font-size: 1.5rem;
            color: var(--text-gold);
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 223, 115, 0.3);
            padding-bottom: 20px;
        }

        .message-content {
            font-size: 1.4rem;
            line-height: 2.2;
            text-align: justify;
            color: #f8e5e5;
            font-weight: 300;
        }

        .paragraph {
            margin-bottom: 25px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s, transform 1s;
        }

        .highlight {
            color: var(--secondary);
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 177, 153, 0.5);
        }

        /* تنسيق شريط التمرير */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        @media (max-width: 768px) {
            .title { font-size: 3rem; }
            .glass-panel { padding: 40px 25px; }
            .message-content { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <canvas id="interactive-canvas"></canvas>

    <!-- شاشة البداية التفاعلية -->
    <div id="intro-screen">
        <div class="heart-btn" onclick="startExperience()">❤️<br><span style="font-size: 1rem; font-family: 'Cairo'; color: #fff; display: block; text-align: center; margin-top: 10px; opacity: 0.7;">المسي القلب</span></div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-container" id="main-content">
        <div class="glass-panel">
            <h1 class="title">إلى ملاذي.. فريال</h1>
            <div class="subtitle">ربع قرن من النور | 25 عاماً</div>
            
            <div class="message-content" id="message-box">
                <!-- سيتم حقن النص هنا برمجياً -->
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. نظام الرسالة النفسية المطولة (Reveal System)
        // ==========================================
        const paragraphs = [
            "في لغة الأرقام، 25 عاماً هي مجرد قياس للزمن.. لكن في لغة الروح والوجود، هي اكتمال ربع قرن من السحر، مسيرة من النور الذي كان يتشكل بهدوء ليضيء عالمي. لم تكوني يوماً مجرد مصادفة في حياتي، بل كنتِ الوجهة التي لم أكن أعلم أنني أبحث عنها.",
            "في علم النفس، يتحدث 'جون بولبي' عن نظرية <span class='highlight'>القاعدة الآمنة (Secure Base)</span>؛ وهي الحالة التي يجد فيها الإنسان شخصاً يمنحه الأمان المطلق، ليتمكن من استكشاف العالم ومواجهة فوضاه وهو مطمئن لأن لديه ملجأ يعود إليه. أنتِ يا فريال لستِ فقط حبيبتي، أنتِ قاعدتي الآمنة، المكان الذي تسقط فيه كل دفاعاتي، وأتجرد فيه من كل أقنعتي لأكون أنا.. فقط أنا.",
            "هناك ظاهرة نفسية تُسمى <span class='highlight'>'التنظيم العاطفي المتبادل'</span>، حيث تستطيع أرواح معينة أن تضبط إيقاع بعضها البعض. هل تلاحظين كيف يهدأ قلقي بمجرد سماع صوتك؟ كيف تعيد ابتسامتك ترتيب الفوضى داخل رأسي؟ هذا ليس مجرد حب، هذا التحام روحي وعقلي لا يحدث إلا مرة في العمر.",
            "في يوم ميلادك، أرى فيكِ عمق <span class='highlight'>'الحوت'</span> الذي يغوص في أعمق وأصدق نقطة في قلبي، وأرى رقة <span class='highlight'>'الباندا'</span> التي تسرق الابتسامة من شفتي بعفويتها ولطفها الذي لا يُقاوم، وأرى حرية <span class='highlight'>'الطير'</span> الذي يحلق بروحي عالياً بعيداً عن ضجيج هذا العالم.",
            "كل عام وأنتِ النسخة الأجمل من نفسك، كل عام وأنتِ المرأة التي تجعلني أريد أن أكون رجلاً أفضل (تأثير بجماليون). أنتِ لستِ فقط جزءاً من حياتي، أنتِ العدسة التي أرى من خلالها جمال هذه الحياة.",
            "أحبكِ.. بعمق البحر، وبسماء الطيور، وبكل نبضة قلب في هذا الكون. ميلاد سعيد يا سيدة القلب."
        ];

        function startExperience() {
            // إخفاء شاشة البداية بصمت
            const intro = document.getElementById('intro-screen');
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                renderMessage();
            }, 1000);
        }

        function renderMessage() {
            const container = document.getElementById('message-box');
            paragraphs.forEach((text, index) => {
                const p = document.createElement('div');
                p.className = 'paragraph';
                p.innerHTML = text;
                container.appendChild(p);
                
                // تأثير ظهور متدرج للفقرات
                setTimeout(() => {
                    p.style.opacity = '1';
                    p.style.transform = 'translateY(0)';
                }, 800 + (index * 1500)); // تأخير بين كل فقرة وأخرى لتركيز القراءة
            });
        }

        // ==========================================
        // 2. محرك الفيزياء البصرية (Interactive Canvas Engine)
        // ==========================================
        const canvas = document.getElementById('interactive-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        
        // تتبع حركة الماوس لإنشاء تأثير التنافر (Repel Effect)
        let mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (event) => {
            mouse.x = event.x;
            mouse.y = event.y;
        });
        
        // عند خروج الماوس من الشاشة
        window.addEventListener('mouseout', () => {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const heartColors = ['#ff0844', '#ffb199', '#cc0022', '#ff4d4d'];
        const entities = ['🐼', '🐋', '🕊️', '✨'];

        class Particle {
            constructor() {
                this.init();
                this.y = Math.random() * height; // توزيع ابتدائي
            }

            init() {
                this.isEntity = Math.random() > 0.65;
                if (this.isEntity) {
                    this.char = entities[Math.floor(Math.random() * entities.length)];
                    this.size = Math.random() * 35 + 15;
                    this.mass = this.size * 0.1;
                } else {
                    this.color = heartColors[Math.floor(Math.random() * heartColors.length)];
                    this.size = Math.random() * 12 + 4;
                    this.mass = this.size * 0.05;
                }

                this.x = Math.random() * width;
                this.y = height + this.size + Math.random() * 200;
                this.baseX = this.x;
                
                this.velocity = {
                    y: -(Math.random() * 1.5 + 0.5),
                    x: (Math.random() - 0.5) * 1
                };
                
                this.angle = Math.random() * 360;
                this.spin = (Math.random() - 0.5) * 2;
                this.opacity = Math.random() * 0.6 + 0.2;
            }

            update() {
                // الحركة الأساسية
                this.y += this.velocity.y;
                this.x += Math.sin(this.angle * Math.PI / 180) * 1.5 + this.velocity.x;
                this.angle += this.spin;

                // -----------------------------------
                // فيزياء التفاعل مع الماوس (Collision & Repel)
                // -----------------------------------
                if (mouse.x != null && mouse.y != null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < mouse.radius) {
                        const forceDirectionX = dx / distance;
                        const forceDirectionY = dy / distance;
                        const force = (mouse.radius - distance) / mouse.radius;
                        
                        // دفع الجزيئات بعيداً عن الماوس
                        const pushX = forceDirectionX * force * 5 * this.mass;
                        const pushY = forceDirectionY * force * 5 * this.mass;
                        
                        this.x -= pushX;
                        this.y -= pushY;
                    }
                }

                // إعادة التدوير عند الخروج من الشاشة
                if (this.y < -100 || this.x < -100 || this.x > width + 100) {
                    this.init();
                    this.y = height + 50;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.globalAlpha = this.opacity;

                if (this.isEntity) {
                    ctx.font = `${this.size}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.char, 0, 0);
                } else {
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                    ctx.beginPath();
                    const topCurveHeight = this.size * 0.3;
                    ctx.moveTo(0, topCurveHeight);
                    ctx.bezierCurveTo(0, 0, -this.size / 2, 0, -this.size / 2, topCurveHeight);
                    ctx.bezierCurveTo(-this.size / 2, this.size / 2, 0, this.size * 0.8, 0, this.size);
                    ctx.bezierCurveTo(0, this.size * 0.8, this.size / 2, this.size / 2, this.size / 2, topCurveHeight);
                    ctx.bezierCurveTo(this.size / 2, 0, 0, 0, 0, topCurveHeight);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // إنشاء شبكة الجزيئات (زيادة العدد لجمالية أكبر)
        for (let i = 0; i < 90; i++) {
            particles.push(new Particle());
        }

        function animateCanvas() {
            // مسح الشاشة مع تأثير ذيل ضبابي خفيف (Trail Effect)
            ctx.fillStyle = 'rgba(10, 0, 2, 0.3)'; 
            ctx.fillRect(0, 0, width, height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animateCanvas);
        }

        animateCanvas();
    </script>
</body>
</html>
